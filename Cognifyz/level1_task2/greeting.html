<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Greeting Alert</title>
  <link rel="stylesheet" href="greeting.css" />
</head>
<body>

  <div class="container">

  </div>

  <script src="greeting.js"></script>

</html>
